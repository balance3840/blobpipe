name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create GitHub releases and tags
      pull-requests: write  # open the changeset version PR
      id-token: write       # npm provenance (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed so changesets can compute which packages changed
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          # Authenticate with the npm registry for publishing
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Opens a "Version Packages" PR when changesets are present.
          # When that PR is merged, this step publishes to npm.
          version: pnpm changeset version
          publish: pnpm changeset publish
          # Commit message used when bumping versions in the release PR
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Publish with npm provenance — ties the package to this exact commit
          NPM_CONFIG_PROVENANCE: true
